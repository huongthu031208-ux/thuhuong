<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vịnh Hạ Long</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌊 NỀN MỚI (MÁT + BIỂN) */
body {
    background: linear-gradient(to bottom, #caf0f8, #f1faff);
}

/* NAVBAR */
nav {
    background: rgba(0, 119, 182, 0.85);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px 30px;
    position: fixed;
    width: 100%;
    z-index: 1000;
}

nav h1 { display: inline; }

nav ul {
    float: right;
    list-style: none;
}

nav ul li {
    display: inline;
    margin-left: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://upload.wikimedia.org/wikipedia/commons/6/6d/Ha_Long_Bay_in_Vietnam.jpg') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    position: relative;
}

/* 🌊 overlay xanh cho hero */
.hero::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 119, 182, 0.35);
}

.hero div {
    position: relative;
    z-index: 1;
}

.hero h2 {
    font-size: 50px;
}

/* SECTION */
section {
    padding: 60px 30px;
    max-width: 1100px;
    margin: auto;
}

h2 {
    margin-bottom: 20px;
    color: #0077b6;
}

/* CARD */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0, 119, 182, 0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.07);
}

/* VIDEO + MAP */
iframe {
    width: 100%;
    height: 400px;
    border-radius: 10px;
    border: none;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* FOOTER */
footer {
    background: linear-gradient(to right, #0077b6, #00b4d8);
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<nav>
    <h1>Hạ Long</h1>
    <ul>
        <li><a href="#about">Giới thiệu</a></li>
        <li><a href="#video">Video</a></li>
        <li><a href="#map">Bản đồ</a></li>
        <li><a href="#gallery">Hình ảnh</a></li>
    </ul>
</nav>

<div class="hero">
    <div>
        <h2>Khám phá Vịnh Hạ Long</h2>
        <p>Kỳ quan thiên nhiên thế giới</p>
    </div>
</div>

<section id="about">
    <h2>Giới thiệu</h2>
    <p>
        Vịnh Hạ Long thuộc tỉnh Quảng Ninh, nổi tiếng với hàng nghìn đảo đá vôi và cảnh quan kỳ vĩ.
    </p>
</section>

<section id="video">
    <h2>Video giới thiệu</h2>
    <iframe src="https://www.youtube.com/embed/q6r8xXxHkqI" allowfullscreen></iframe>
</section>

<section id="map">
    <h2>Bản đồ</h2>
    <iframe src="https://www.google.com/maps?q=Ha+Long+Bay&output=embed"></iframe>
</section>

<section id="gallery">
    <h2>Hình ảnh</h2>
    <div class="gallery">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Ha_Long_Bay_in_Vietnam.jpg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Ha_Long_Bay_2.jpg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2d/Halongbay.jpg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Halong_Bay_boats.jpg">
    </div>
</section>

<footer>
    <p>© 2026 - Website du lịch Vịnh Hạ Long</p>
</footer>

</body>
</html>
