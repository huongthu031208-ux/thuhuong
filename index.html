<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Du lịch Vịnh Hạ Long</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f0f4f8;}

header{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1528127269322-539801943592') center/cover;
    display:flex;align-items:center;justify-content:center;
    color:white;text-align:center;
}
header h1{font-size:50px;background:rgba(0,0,0,0.5);padding:20px;border-radius:10px;}

nav{background:#0077b6;text-align:center;padding:10px;}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold;}

.container{max-width:1100px;margin:auto;padding:20px;}

.card{
    background:white;margin-bottom:20px;padding:20px;
    border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* SLIDER */
.slider{position:relative;overflow:hidden;border-radius:15px;}
.slides{display:flex;transition:0.5s;}
.slides img{width:100%;}

button.prev, button.next{
    position:absolute;top:50%;transform:translateY(-50%);
    background:rgba(0,0,0,0.5);color:white;border:none;
    padding:10px;cursor:pointer;
}
.prev{left:10px;} .next{right:10px;}

/* QUIZ */
.quiz button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#0077b6;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
.quiz button:hover{background:#023e8a;}

footer{
    text-align:center;padding:15px;
    background:#0077b6;color:white;
}
</style>
</head>

<body>

<header>
    <h1>🌊 Du lịch Vịnh Hạ Long</h1>
</header>

<nav>
    <a href="#slider">Ảnh</a>
    <a href="#video">Video</a>
    <a href="#map">Bản đồ</a>
    <a href="#quiz">Quiz</a>
</nav>

<div class="container">

<!-- SLIDER -->
<div class="card" id="slider">
<h2>📸 Ảnh Vịnh Hạ Long</h2>
<div class="slider">
    <div class="slides" id="slides">
        <img src="https://images.unsplash.com/photo-1583417319070-4a69db38a482">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98">
    </div>
    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>
</div>
</div>

<!-- VIDEO -->
<div class="card" id="video">
<h2>🎬 Video Vịnh Hạ Long</h2>
<iframe width="100%" height="400"
src="https://www.youtube.com/embed/qREKP9oijWI"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- MAP -->
<div class="card" id="map">
<h2>🗺️ Bản đồ</h2>
<iframe 
width="100%" height="400" 
src="https://www.google.com/maps?q=Ha+Long+Bay&output=embed">
</iframe>
</div>

<!-- QUIZ -->
<div class="card quiz" id="quiz">
<h2>🧠 Quiz nhanh</h2>
<p>Vịnh Hạ Long thuộc tỉnh nào?</p>
<button onclick="checkAnswer('A')">A. Quảng Ninh</button><br>
<button onclick="checkAnswer('B')">B. Đà Nẵng</button><br>
<button onclick="checkAnswer('C')">C. Khánh Hòa</button>

<p id="result"></p>
</div>

</div>

<footer>
<p>✨ Khám phá Vịnh Hạ Long</p>
</footer>

<script>
let index = 0;

function showSlide(i){
    const slides = document.getElementById("slides");
    const total = slides.children.length;
    if(i >= total) index = 0;
    else if(i < 0) index = total - 1;
    else index = i;
    slides.style.transform = "translateX(" + (-index * 100) + "%)";
}

function nextSlide(){ showSlide(index + 1); }
function prevSlide(){ showSlide(index - 1); }

function checkAnswer(ans){
    let result = document.getElementById("result");
    if(ans === 'A'){
        result.innerHTML = "✅ Chính xác!";
        result.style.color = "green";
    } else {
        result.innerHTML = "❌ Sai rồi!";
        result.style.color = "red";
    }
}
</script>

</body>
</html>
